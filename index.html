<!------------------------------------- TABELA DE PONTOS -------------------------------------->
body{
    font-family: Arial, sans-serif;
    background:#000;
    margin:0;
    padding:0px;
}

.tabela{
    width:100%;
    max-width:400px;
    margin:auto;
    opacity:1;
    border-radius:20px;
    overflow:hidden;
    box-shadow:0 5px 10px rgba(0,0,0,0.1);
    border:3px solid #FFF;
}

.header, .linha{
    display:grid;
    border-bottom:3px solid #FFFFFF;
    grid-template-columns: 1fr 40px 40px 40px 40px 40px;
    align-items:center;
    padding:10px;
}

.header{
    font-weight:bold;
}

.linha{
    border-bottom:1px solid #FFFFFF;
    position:relative;
}

/* Nome do time */
.time{
    display:flex;
    align-items:center;
    gap:8px;
    color:#FFF;
}
.pontos{
    color:#FFF;
}

/* Barras coloridas */
.linha::before{
    content:"";
    position:absolute;
    left:0;
    top:0;
    width:5px;
    height:100%;
}
.azul::before{ background:#4876FF; }
.verde::before{ background:#2ecc71; }
.laranja::before{ background:#f39c12; }
.vermelho::before{ background:#e74c3c; }

function trocarRodada(num){

    const container = document.getElementById("jogos");

    // anima saída
    container.classList.add("fade-out");

    setTimeout(() => {
        // troca conteúdo
        container.innerHTML = rodadas[num];

        // remove fade-out e aplica fade-in
        container.classList.remove("fade-out");
        container.classList.add("fade-in");

        // remove classe depois da animação
        setTimeout(()=>{
            container.classList.remove("fade-in");
        },300);

    },300);

    // botão ativo
    document.querySelectorAll(".rodada-btn").forEach(btn => btn.classList.remove("ativa"));
    document.querySelectorAll(".rodada-btn")[num-1].classList.add("ativa");
}

// iniciar rodada 1
