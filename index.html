<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jogo da Memória - Animais</title>

<style>
body{
    margin:0;
    font-family: Arial, Helvetica, sans-serif;
    background: linear-gradient(180deg,#0f2027,#203a43,#2c5364);
    text-align:center;
    color:white;
}

h1{
    margin-top:15px;
}

#placar{
    font-size:18px;
    margin:10px;
}

.tabuleiro{
    display:grid;
    grid-template-columns: repeat(6, 1fr); /* 6 colunas para modo vertical */
    max-width:420px; /* largura ideal para celular */
    margin:20px auto;
    gap:8px;
}

.carta{
    aspect-ratio:1/1;
    background:#ffffff;
    border-radius:12px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:28px;
    cursor:pointer;
    transition:transform 0.3s;
}

.carta:hover{
    transform:scale(1.05);
}

.carta.fechada{
    background:#111;
}

#mensagem{
    font-size:20px;
    margin:15px;
    font-weight:bold;
}
</style>
</head>
<body>

<h1>🐾 Jogo da Memória</h1>

<div id="placar">
Jogador 1: <span id="p1">0</span> |
Jogador 2: <span id="p2">0</span><br>
Vez do: <span id="vez">Jogador 1</span>
</div>

<div class="tabuleiro" id="tabuleiro"></div>

<div id="mensagem"></div>

<!-- Som -->
<audio id="somVirar" src="https://www.soundjay.com/button/sounds/button-16.mp3"></audio>
<audio id="somAcerto" src="https://www.soundjay.com/button/sounds/button-4.mp3"></audio>

<script>
let jogador = 1
let pontos1 = 0
let pontos2 = 0
let primeira = null
let segunda = null
let bloqueado = false

let somVirar = document.getElementById("somVirar")
let somAcerto = document.getElementById("somAcerto")

// 36 animais = 72 cartas
let animais = [
"🐶","🐱","🐭","🐹","🐰","🦊","🐻","🐼",
"🐨","🐯","🦁","🐮","🐷","🐸","🐵","🐔",
"🐧","🐦","🦆","🦉","🦅","🐺","🐗","🐴",
"🦄","🐝","🐛","🦋","🐌","🐞","🐢","🐍",
"🐙","🦑","🦀","🐠"
]

let cartasArray = [...animais, ...animais]
cartasArray.sort(()=>Math.random()-0.5)

let tabuleiro = document.getElementById("tabuleiro")

cartasArray.forEach(valor=>{
    let carta = document.createElement("div")
    carta.classList.add("carta","fechada")
    carta.dataset.valor = valor
    carta.innerHTML = "❓"
    carta.addEventListener("click", virarCarta)
    tabuleiro.appendChild(carta)
})

function virarCarta(){
    if(bloqueado) return
    if(!this.classList.contains("fechada")) return

    somVirar.currentTime = 0
    somVirar.play()

    this.classList.remove("fechada")
    this.innerHTML = this.dataset.valor

    if(!primeira){
        primeira = this
    }else{
        segunda = this
        bloqueado = true

        if(primeira.dataset.valor === segunda.dataset.valor){

            somAcerto.currentTime = 0
            somAcerto.play()

            if(jogador === 1){
                pontos1++
                document.getElementById("p1").innerText = pontos1
            }else{
                pontos2++
                document.getElementById("p2").innerText = pontos2
            }

            resetar()
        }else{
            setTimeout(()=>{
                primeira.classList.add("fechada")
                segunda.classList.add("fechada")
                primeira.innerHTML="❓"
                segunda.innerHTML="❓"
                trocarJogador()
                resetar()
            },900)
        }
    }
}

function trocarJogador(){
    jogador = jogador === 1 ? 2 : 1
    document.getElementById("vez").innerText = "Jogador " + jogador
}

function resetar(){
    primeira = null
    segunda = null
    bloqueado = false
    verificarFim()
}

function verificarFim(){
    if(pontos1 + pontos2 === 36){
        let msg=""
        if(pontos1 > pontos2) msg="🏆 Jogador 1 venceu!"
        else if(pontos2 > pontos1) msg="🏆 Jogador 2 venceu!"
        else msg="🤝 Empate!"
        document.getElementById("mensagem").innerText = msg
    }
}
</script>

</body>
</html>
