<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jogo da Memória Multiplayer</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, sans-serif;
    background:#111;
    color:white;
    transition:0.4s;
    overflow-x:hidden;
}

/* MENU */
.menu{
    position:fixed;
    inset:0;
    background:#000;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    z-index:999;
}

.menu h1{
    font-size:40px;
    margin-bottom:20px;
}

.players{
    display:flex;
    gap:20px;
    margin-bottom:20px;
}

.player-option{
    padding:20px;
    border-radius:15px;
    cursor:pointer;
    border:3px solid transparent;
    transition:0.3s;
}

.player-option:hover{
    transform:scale(1.05);
}

.blue{
    background:#0066ff;
}

.red{
    background:#ff0000;
}

.selected{
    border:3px solid #fff;
}

button{
    padding:15px 30px;
    border:none;
    border-radius:10px;
    font-size:18px;
    cursor:pointer;
    font-weight:bold;
}

/* GAME */
.game-container{
    padding:0px;
    display:none;
}

.top{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:2px;
    flex-wrap:wrap;
    gap:10px;
}

.info{
    font-size:10px;
    font-weight:bold;
}

.board{
    display:grid;
    grid-template-columns:repeat(12, 1fr);
    gap:8px;
    max-width:1400px;
    margin:auto;
    padding:1px;
}

.card{
    width:100%;
    aspect-ratio:1/1;
    background:#000;
    border:1px solid #000;
    position:relative;
    cursor:pointer;
    transform-style:preserve-3d;
    transition:0.5s;
}

.card.flip{
    transform:rotateY(180deg);
}

.front,
.back{
    position:absolute;
    inset:0;
    display:flex;
    align-items:center;
    justify-content:center;
    backface-visibility:hidden;
    font-size:35px;
    border:4px solid #000;
}

.front{
    background:linear-gradient(135deg,#888,#666);
}

.back{
    background:white;
    transform:rotateY(180deg);
}

/* WINNER BOX */
.winner{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.8);
    display:none;
    justify-content:center;
    align-items:center;
    z-index:9999;
}

.winner-box{
    background:#222;
    padding:40px;
    border-radius:20px;
    text-align:center;
    width:90%;
    max-width:400px;
}

.winner-box h2{
    margin-bottom:20px;
    font-size:30px;
}

.winner-box button{
    margin-top:20px;
}
html,body{
    width:100%;
    height:100%;
    overflow:hidden;
}

.game-container{
    width:100vw;
    height:100vh;
    overflow:auto;
}

/* FORÇA MODO HORIZONTAL */
@media screen and (orientation:portrait){

    body::before{
        content:"🔄 VIRE O CELULAR PARA JOGAR";
        position:fixed;
        inset:0;
        background:#000;
        color:#fff;
        display:flex;
        align-items:center;
        justify-content:center;
        font-size:30px;
        z-index:99999;
        text-align:center;
        padding:20px;
    }

    .game-container{
        display:none;
    }
}

/* RESPONSIVO */
@media(max-width:700px){
    .board{
display:grid;
    grid-template-columns:repeat(8,
    }
 1fr);
}
</style>
</head>
<body>

<audio id="flipSound">
<source src="https://www.soundjay.com/buttons_c2026/sounds/button-20.mp3" type="audio/mpeg">
</audio>

<audio id="winSound">
<source src="https://assets.mixkit.co/active_storage/sfx/1435/1435-preview.mp3" type="audio/mpeg">
</audio>

<audio id="winnerBox">
<source src="https://assets.mixkit.co/active_storage/sfx/1435/1435-preview.mp3" type="audio/mpeg">
</audio>

<audio id="matchSound">
<source src="https://assets.mixkit.co/active_storage/sfx/2000/2000-preview.mp3" type="audio/mpeg">
</audio>


<!-- MENU -->
<div class="menu" id="menu">
    <h1>🧠 JOGO DA MEMÓRIA</h1>

    <div class="players">
        <div class="player-option blue selected" id="p1Color">
            PLAYER 1 🔵
        </div>

        <div class="player-option red selected" id="p2Color">
            PLAYER 2 🔴
        </div>
    </div>

    <button onclick="startGame()">INICIAR JOGO</button>
</div>

<!-- JOGO -->
<div class="game-container" id="game">

    <div class="top">
        <div class="info" id="turn">
            VEZ DO PLAYER 1
        </div>

        <div class="info">
            🔵 P1: <span id="score1">0</span>
            |
            🔴 P2: <span id="score2">0</span>
        </div>
    </div>

    <div class="board" id="board"></div>

</div>

<!-- VENCEDOR -->
<div class="winner" id="winnerBox">
    <div class="winner-box">
        <h2 id="winnerText"></h2>

        <button onclick="location.reload()">
            JOGAR NOVAMENTE
        </button>
    </div>
</div>

<script>

const emojis = [

"🍎","🍎",
"⚽","⚽",
"🚗","🚗",
"🎮","🎮",
"🐶","🐶",
"🔥","🔥",
"💎","💎",
"🍕","🍕",
"🎧","🎧",
"👑","👑",
"🌈","🌈",
"🚀","🚀",
"🐱","🐱",
"🍔","🍔",
"🦄","🦄",
"🎲","🎲",
"🏀","🏀",
"🎸","🎸",
"🍩","🍩",
"🐸","🐸",
"🛸","🛸",
"🌟","🌟",
"🍇","🍇",
"🎯","🎯",
"🦋","🦋",
"⚡","⚡",
"🍓","🍓",
"🧩","🧩",
"🚴","🚴",
"🎹","🎹",
"🦁","🦁",
"🍟","🍟",
"🎤","🎤",
"🌍","🌍",
"🛹","🚴",
"🛹","🛹"

];
let board = document.getElementById("board");

let firstCard = null;
let secondCard = null;
let lock = false;

let currentPlayer = 1;

let score1 = 0;
let score2 = 0;

function shuffle(array){
    return array.sort(() => Math.random() - 0.5);
}

function startGame(){

    document.getElementById("menu").style.display = "none";
    document.getElementById("game").style.display = "block";

    createBoard();
    updateTurn();
}

function createBoard(){

    let cards = shuffle(emojis);

    cards.forEach(emoji => {

        let card = document.createElement("div");
        card.className = "card";
        card.dataset.emoji = emoji;

        card.innerHTML = `
            <div class="front"></div>
            <div class="back">${emoji}</div>
        `;

        card.onclick = () => flipCard(card);

        board.appendChild(card);
    });
}

function flipCard(card){

    if(lock) return;
    if(card.classList.contains("flip")) return;
    
    document.getElementById("flipSound").play();

    card.classList.add("flip");

    if(!firstCard){
        firstCard = card;
        return;
    }

    secondCard = card;
    lock = true;

    checkMatch();
}

function checkMatch(){

    let match = firstCard.dataset.emoji === secondCard.dataset.emoji;

    if(match){
    
        document.getElementById("matchSound").play();
        
        if(currentPlayer === 1){
            score1++;
            document.getElementById("score1").innerText = score1;
        }else{
            score2++;
            document.getElementById("score2").innerText = score2;
        }

        resetCards();
        checkWinner();

    }else{

        setTimeout(() => {

            firstCard.classList.remove("flip");
            secondCard.classList.remove("flip");

            changePlayer();

            resetCards();

        },1000);
    }
}

function resetCards(){
    firstCard = null;
    secondCard = null;
    lock = false;
}

function changePlayer(){

    currentPlayer = currentPlayer === 1 ? 2 : 1;

    updateTurn();
}

function updateTurn(){

    let turn = document.getElementById("turn");

    if(currentPlayer === 1){

        document.body.style.background = "#002b80";

        turn.innerHTML = "VEZ DO PLAYER 1 🔵";

    }else{

        document.body.style.background = "#660000";

        turn.innerHTML = "VEZ DO PLAYER 2 🔴";
    }
}

function checkWinner(){

    let total = score1 + score2;

    if(total === emojis.length / 2){

        let text = "";

        if(score1 > score2){

            text = "🎉 PARABÉNS PLAYER 1, VOCÊ GANHOU!";

        }else if(score2 > score1){

            text = "🎉 PARABÉNS PLAYER 2, VOCÊ GANHOU!";

        }else{

            text = "🤝 EMPATE!";
        }

  document.getElementById("winnerText").innerText = text;

  document.getElementById("winnerBox").style.display = "flex";
  
  document.getElementById("winSound").play(); 
    }
}

</script>

</body>
</html>
